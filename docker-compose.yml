services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lucerna
      POSTGRES_USER: lucerna
      POSTGRES_PASSWORD: lucerna
    ports:
      - "5432:5432"
    volumes:
      - lucerna_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucerna -d lucerna"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/lucerna
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: docker-dev-not-for-prod
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
      POSTGRES_HOST: db
      POSTGRES_DB: lucerna
      POSTGRES_USER: lucerna
      POSTGRES_PASSWORD: lucerna
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      LUCERNA_DEFAULT_CLEARANCE: "2"
    depends_on:
      db:
        condition: service_healthy

volumes:
  lucerna_pg:
